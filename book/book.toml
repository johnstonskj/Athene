[book]
title = "Athene - OWL Tools"
authors = ["Simon Johnston <johnstonskj@gmail.com>"]
language = "en"
src = "src"

[build]
build-dir = "output"
create-missing = true

[output.html]
site-url = "https://simonkjohnston.life/Athene"
git-repository-url = "https://github.com/johnstonskj/Athene"
additional-css = ["src/athene.css"]
mathjax-support = false
theme = "src/theme"

[output.html.fold]
enable = true
level = 2

[output.html.playpen]
line-numbers = true

[output.html.search]
use-boolean-and = true
